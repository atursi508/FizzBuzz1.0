name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        ruby-version: ['3.0', '3.1', '3.2']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
    
    - name: Install dependencies
      run: |
        gem install minitest
    
    - name: Run tests
      run: ruby test_fizzbuzz.rb

    - name: Display FizzBuzz Output
      run: |
        ruby -e "require_relative 'fizzbuzz'; FizzBuzz.new.print_numbers"
